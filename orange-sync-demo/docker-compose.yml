services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orange_sync_demo
      POSTGRES_USER: orange
      POSTGRES_PASSWORD: orange
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orange -d orange_sync_demo"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
